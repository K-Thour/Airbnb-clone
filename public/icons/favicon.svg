<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- StayEasy Hotel Booking - Favicon -->
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1B4FD8"/>
  <!-- Headboard -->
  <rect x="10" y="18" width="7" height="30" rx="3" fill="white"/>
  <!-- Footboard -->
  <rect x="47" y="26" width="7" height="22" rx="3" fill="white"/>
  <!-- Bed base -->
  <rect x="10" y="44" width="44" height="10" rx="3" fill="white"/>
  <!-- Mattress -->
  <rect x="17" y="28" width="30" height="18" rx="2" fill="white" opacity="0.92"/>
  <!-- Pillow 1 -->
  <rect x="19" y="30" width="12" height="8" rx="3" fill="#93C5FD"/>
  <!-- Pillow 2 -->
  <rect x="33" y="30" width="12" height="8" rx="3" fill="#93C5FD"/>
  <!-- Crescent moon (top right) -->
  <circle cx="52" cy="12" r="5" fill="#FBBF24"/>
  <circle cx="56" cy="10" r="3.5" fill="#1B4FD8"/>
